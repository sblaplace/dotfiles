apiVersion: v1
kind: Namespace
metadata:
  name: forgejo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:7
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 22
              name: ssh
          env:
            - name: FORGEJO__database__DB_TYPE
              value: sqlite3
            - name: FORGEJO__server__DOMAIN
              value: git.local
            - name: FORGEJO__server__SSH_DOMAIN
              value: git.local
            - name: FORGEJO__server__ROOT_URL
              value: http://git.local
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    io.cilium/lb-pool: main
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
      name: http
    - port: 22
      targetPort: 22
      name: ssh
  selector:
    app: forgejo
